<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobTrack AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--bg2:#141414;--bg3:#1c1c1c;--bg4:#242424;
  --or:#FF4500;--gold:#FFD700;--green:#22c55e;--blue:#3b82f6;--purple:#8b5cf6;
  --tx:#f0f0f0;--mu:#888;--bd:#2a2a2a;
}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;font-size:14px}
a{color:inherit;text-decoration:none}

/* Layout */
.layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;padding:0}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}

/* Sidebar */
.sidebar-logo{padding:20px 20px 16px;font-size:1.1rem;font-weight:600;color:var(--or);border-bottom:1px solid var(--bd)}
.sidebar-logo span{color:var(--tx)}
.nav{flex:1;padding:12px 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:var(--mu);font-size:13px;font-weight:500;transition:.15s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--bg3);color:var(--tx)}
.nav-item.active{background:rgba(255,69,0,.1);color:var(--or)}
.nav-item svg{flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.nav-section{font-size:10px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;padding:14px 12px 6px}
.sidebar-bottom{padding:12px;border-top:1px solid var(--bd)}
.scrape-btn{width:100%;background:var(--or);color:#fff;border:none;padding:10px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:.15s}
.scrape-btn:hover{opacity:.88}
.scrape-btn:disabled{opacity:.4;cursor:not-allowed}

/* Topbar */
.topbar{padding:16px 24px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--bg);flex-shrink:0}
.topbar-title{font-size:1.1rem;font-weight:600}
.topbar-sub{font-size:12px;color:var(--mu);margin-top:1px}
.topbar-actions{display:flex;gap:8px;align-items:center}

/* Content */
.content{padding:24px;flex:1}

/* Cards */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.stat{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:16px}
.stat-label{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.stat-val{font-size:24px;font-weight:600;line-height:1}
.stat-sub{font-size:11px;color:var(--mu);margin-top:3px}

/* Job list */
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-btn{background:var(--bg2);border:1px solid var(--bd);color:var(--mu);padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;transition:.15s}
.filter-btn:hover,.filter-btn.active{border-color:var(--or);color:var(--or);background:rgba(255,69,0,.06)}
.search-input{background:var(--bg2);border:1px solid var(--bd);color:var(--tx);padding:6px 12px;border-radius:8px;font-size:13px;width:200px;outline:none}
.search-input:focus{border-color:var(--or)}
.search-input::placeholder{color:var(--mu)}

.job-table{width:100%;border-collapse:collapse}
.job-table th{text-align:left;padding:8px 12px;font-size:11px;color:var(--mu);font-weight:500;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--bd)}
.job-table td{padding:10px 12px;border-bottom:1px solid var(--bd);vertical-align:middle}
.job-table tr:hover td{background:var(--bg2)}
.job-row{cursor:pointer}
.job-title-cell{font-weight:500;font-size:13px}
.job-company-cell{color:var(--mu);font-size:12px}
.score-pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.score-high{background:rgba(34,197,94,.15);color:#22c55e}
.score-mid{background:rgba(255,152,0,.15);color:#FF9800}
.score-low{background:rgba(136,135,128,.15);color:#888}
.status-pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500}
.status-new{background:rgba(59,130,246,.12);color:#60a5fa}
.status-saved{background:rgba(139,92,246,.12);color:#a78bfa}
.status-applied{background:rgba(255,152,0,.15);color:#FF9800}
.status-interview{background:rgba(255,215,0,.12);color:#FFD700}
.status-offer{background:rgba(34,197,94,.12);color:#22c55e}
.status-rejected{background:rgba(136,135,128,.15);color:#666}
.tag{display:inline-block;background:var(--bg3);border:1px solid var(--bd);padding:1px 7px;border-radius:4px;font-size:10px;color:var(--mu);margin-right:3px}
.source-icon{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;background:var(--bg3)}

/* Kanban */
.kanban-board{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;min-height:400px}
.kanban-col{flex:0 0 210px;min-width:210px}
.kanban-header{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;margin-bottom:8px}
.kanban-col-title{font-size:12px;font-weight:600}
.kanban-count{font-size:11px;padding:1px 7px;border-radius:20px}
.kanban-card{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:.15s}
.kanban-card:hover{border-color:rgba(255,69,0,.4)}
.kanban-card-title{font-size:12px;font-weight:500;margin-bottom:3px;line-height:1.3}
.kanban-card-co{font-size:11px;color:var(--mu);margin-bottom:8px}
.kanban-card-footer{display:flex;justify-content:space-between;align-items:center}
.score-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* Detail panel */
.detail-panel{position:fixed;right:0;top:0;width:420px;height:100vh;background:var(--bg2);border-left:1px solid var(--bd);transform:translateX(100%);transition:transform .25s;z-index:100;overflow-y:auto;display:flex;flex-direction:column}
.detail-panel.open{transform:translateX(0)}
.detail-header{padding:18px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-shrink:0}
.detail-close{background:none;border:none;color:var(--mu);cursor:pointer;font-size:18px;padding:0;line-height:1}
.detail-body{padding:20px;flex:1}
.d-title{font-size:1.1rem;font-weight:600;margin-bottom:3px}
.d-co{color:var(--mu);font-size:13px;margin-bottom:16px}
.d-section{margin-bottom:18px}
.d-section-label{font-size:10px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.d-section-body{font-size:13px;color:var(--mu);line-height:1.6}
.analysis-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.analysis-item{background:var(--bg3);border-radius:8px;padding:10px 12px}
.analysis-item-label{font-size:10px;color:var(--mu);margin-bottom:3px}
.analysis-item-val{font-size:13px;font-weight:500}
.analysis-list{display:flex;flex-direction:column;gap:4px}
.analysis-list li{font-size:12px;color:var(--mu);list-style:none;padding-left:14px;position:relative}
.analysis-list li::before{content:"•";position:absolute;left:3px;color:var(--or)}
.big-score{font-size:2.5rem;font-weight:700;color:var(--or);line-height:1}
.score-label{font-size:12px;color:var(--mu);margin-top:2px}
textarea.note-field{width:100%;background:var(--bg3);border:1px solid var(--bd);color:var(--tx);padding:10px 12px;border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;resize:vertical;min-height:80px;outline:none}
textarea.note-field:focus{border-color:var(--or)}
select.status-field{width:100%;background:var(--bg3);border:1px solid var(--bd);color:var(--tx);padding:8px 12px;border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;outline:none;cursor:pointer}
select.status-field:focus{border-color:var(--or)}
.cover-output{background:var(--bg3);border:1px solid var(--bd);border-radius:8px;padding:14px;font-size:13px;color:var(--mu);line-height:1.7;white-space:pre-wrap}
.btn{background:var(--bg3);border:1px solid var(--bd);color:var(--tx);padding:7px 14px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{border-color:var(--or);color:var(--or)}
.btn-primary{background:var(--or);border-color:var(--or);color:#fff}
.btn-primary:hover{opacity:.85;color:#fff}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:14px}

/* Insights */
.insight-card{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:16px;margin-bottom:12px}
.insight-title{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.insight-body{font-size:13px;color:var(--mu);line-height:1.7;white-space:pre-wrap}
.follow-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(255,152,0,.06);border:1px solid rgba(255,152,0,.2);border-radius:8px;margin-bottom:8px}
.follow-days{background:rgba(255,152,0,.2);color:#FF9800;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;flex-shrink:0}

/* Profile */
.profile-form{max-width:540px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:11px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.form-input{width:100%;background:var(--bg2);border:1px solid var(--bd);color:var(--tx);padding:9px 12px;border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;outline:none}
.form-input:focus{border-color:var(--or)}
.tags-input-container{display:flex;flex-wrap:wrap;gap:6px;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:8px 10px;min-height:44px;cursor:text}
.tags-input-container:focus-within{border-color:var(--or)}
.tag-chip{background:rgba(255,69,0,.12);border:1px solid rgba(255,69,0,.25);color:var(--or);padding:2px 9px;border-radius:20px;font-size:12px;display:flex;align-items:center;gap:5px}
.tag-chip button{background:none;border:none;color:var(--or);cursor:pointer;font-size:13px;padding:0;line-height:1;opacity:.7}
.tag-chip button:hover{opacity:1}
.tags-text-input{background:none;border:none;color:var(--tx);font-size:13px;outline:none;flex:1;min-width:80px;font-family:'Inter',sans-serif}

/* Loading */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--bd);border-top-color:var(--mu);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay{display:flex;align-items:center;justify-content:center;padding:48px;flex-direction:column;gap:12px;color:var(--mu)}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--bd);color:var(--tx);padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
#toast.show{opacity:1}

/* Empty state */
.empty{text-align:center;padding:48px 20px;color:var(--mu)}
.empty-icon{font-size:2.5rem;display:block;margin-bottom:12px;opacity:.4}

@media(max-width:768px){.sidebar{display:none}.detail-panel{width:100%}}
</style>
</head>
<body>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">Job<span>Track</span> AI</div>
    <nav class="nav">
      <button class="nav-item active" onclick="navigate('jobs')" id="nav-jobs">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
        Empleos
      </button>
      <button class="nav-item" onclick="navigate('pipeline')" id="nav-pipeline">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="5" height="18" rx="1"/><rect x="10" y="8" width="5" height="13" rx="1"/><rect x="17" y="5" width="5" height="16" rx="1"/></svg>
        Pipeline
      </button>
      <button class="nav-item" onclick="navigate('insights')" id="nav-insights">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M2 20h20M6 20V10M12 20V4M18 20v-7"/></svg>
        Insights IA
      </button>
      <div class="nav-section">Configuración</div>
      <button class="nav-item" onclick="navigate('profile')" id="nav-profile">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        Mi Perfil
      </button>
    </nav>
    <div class="sidebar-bottom">
      <button class="scrape-btn" onclick="triggerScrape()" id="scrape-btn">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Buscar empleos ahora
      </button>
      <div id="scrape-status" style="font-size:11px;color:var(--mu);text-align:center;margin-top:8px;display:none">
        <span class="spinner" style="width:10px;height:10px"></span> Scraping en progreso...
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div id="page-jobs" class="page">
      <div class="topbar">
        <div>
          <div class="topbar-title">Empleos</div>
          <div class="topbar-sub" id="jobs-count">Cargando...</div>
        </div>
        <div class="topbar-actions">
          <input class="search-input" type="text" placeholder="Buscar..." id="search-field" oninput="filterJobs()">
        </div>
      </div>
      <div class="content">
        <div class="stats-row" id="stats-row"></div>
        <div class="filters" id="filters-bar">
          <button class="filter-btn active" onclick="setFilter('all',this)">Todos</button>
          <button class="filter-btn" onclick="setFilter('new',this)">Nuevos</button>
          <button class="filter-btn" onclick="setFilter('saved',this)">Guardados</button>
          <button class="filter-btn" onclick="setFilter('applied',this)">Aplicados</button>
          <button class="filter-btn" onclick="setFilter('interview',this)">Entrevista</button>
          <button class="filter-btn" onclick="setFilter('offer',this)">Ofertas</button>
          <div style="margin-left:auto;display:flex;gap:6px">
            <button class="filter-btn" onclick="setSortScore()" id="sort-score-btn">⬇ Score</button>
          </div>
        </div>
        <div id="jobs-list"></div>
      </div>
    </div>

    <div id="page-pipeline" class="page" style="display:none">
      <div class="topbar">
        <div>
          <div class="topbar-title">Pipeline</div>
          <div class="topbar-sub">Seguimiento de aplicaciones</div>
        </div>
      </div>
      <div class="content">
        <div class="kanban-board" id="kanban-board"></div>
      </div>
    </div>

    <div id="page-insights" class="page" style="display:none">
      <div class="topbar">
        <div>
          <div class="topbar-title">Insights IA</div>
          <div class="topbar-sub">Análisis inteligente de tu búsqueda</div>
        </div>
        <div class="topbar-actions">
          <button class="btn btn-primary" onclick="loadInsights()">Actualizar análisis</button>
        </div>
      </div>
      <div class="content" id="insights-content">
        <div class="loading-overlay"><div class="spinner" style="width:24px;height:24px;border-width:3px"></div><div>Cargando insights...</div></div>
      </div>
    </div>

    <div id="page-profile" class="page" style="display:none">
      <div class="topbar">
        <div>
          <div class="topbar-title">Mi Perfil</div>
          <div class="topbar-sub">Datos que usa la IA para calcular el match</div>
        </div>
        <div class="topbar-actions">
          <button class="btn btn-primary" onclick="saveProfile()">Guardar cambios</button>
        </div>
      </div>
      <div class="content">
        <div class="profile-form" id="profile-form"></div>
      </div>
    </div>
  </div>
</div>

<!-- DETAIL PANEL -->
<div class="detail-panel" id="detail-panel">
  <div class="detail-header">
    <div style="flex:1" id="detail-header-content"></div>
    <button class="detail-close" onclick="closeDetail()">✕</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<div id="toast"></div>

<script>
const API = '';
let currentFilter = 'all';
let currentSort = 'scraped_at';
let allJobs = [];
let currentJobId = null;
let scrapeInterval = null;

// ─── Navigation ───────────────────────────────────────────────────────────────

function navigate(page) {
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + page).style.display = 'flex';
  document.getElementById('page-' + page).style.flexDirection = 'column';
  document.getElementById('nav-' + page).classList.add('active');

  if (page === 'jobs') loadJobs();
  if (page === 'pipeline') loadPipeline();
  if (page === 'insights') loadInsights();
  if (page === 'profile') loadProfile();
}

// ─── Stats ────────────────────────────────────────────────────────────────────

async function loadStats() {
  try {
    const r = await fetch(`${API}/api/stats`);
    const s = await r.json();
    const statuses = Object.fromEntries((s.byStatus||[]).map(x => [x.status, x.n]));
    document.getElementById('stats-row').innerHTML = `
      <div class="stat"><div class="stat-label">Total empleos</div><div class="stat-val">${s.total}</div></div>
      <div class="stat"><div class="stat-label">Aplicados</div><div class="stat-val" style="color:var(--or)">${(statuses.applied||0)+(statuses.aplicado||0)}</div></div>
      <div class="stat"><div class="stat-label">Entrevistas</div><div class="stat-val" style="color:var(--gold)">${statuses.interview||0}</div></div>
      <div class="stat"><div class="stat-label">Score promedio</div><div class="stat-val">${s.avgScore||0}%</div></div>
    `;
  } catch {}
}

// ─── Jobs ─────────────────────────────────────────────────────────────────────

async function loadJobs() {
  document.getElementById('jobs-list').innerHTML = `<div class="loading-overlay"><div class="spinner" style="width:24px;height:24px;border-width:3px"></div></div>`;
  await loadStats();
  try {
    const r = await fetch(`${API}/api/jobs?limit=200&sort=${currentSort}&order=DESC`);
    const d = await r.json();
    allJobs = d.jobs || [];
    document.getElementById('jobs-count').textContent = `${allJobs.length} empleos encontrados`;
    renderJobsTable(filteredJobs());
  } catch (err) {
    document.getElementById('jobs-list').innerHTML = `<div class="empty"><span class="empty-icon">⚠️</span>No se pudo conectar al servidor.<br>Verificá que el servidor esté corriendo en el puerto 3000.</div>`;
  }
}

function filteredJobs() {
  const search = (document.getElementById('search-field')?.value || '').toLowerCase();
  return allJobs.filter(j => {
    const matchFilter = currentFilter === 'all' || j.status === currentFilter;
    const matchSearch = !search || j.title.toLowerCase().includes(search) || j.company.toLowerCase().includes(search);
    return matchFilter && matchSearch;
  });
}

function filterJobs() { renderJobsTable(filteredJobs()); }
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderJobsTable(filteredJobs());
}
function setSortScore() {
  currentSort = currentSort === 'match_score' ? 'scraped_at' : 'match_score';
  const btn = document.getElementById('sort-score-btn');
  btn.textContent = currentSort === 'match_score' ? '⬇ Score' : '⬇ Fecha';
  const sorted = [...filteredJobs()].sort((a,b) =>
    currentSort === 'match_score' ? (b.match_score||0)-(a.match_score||0) : 0
  );
  renderJobsTable(sorted);
}

function scorePill(s) {
  if (!s) return `<span class="score-pill score-low">—</span>`;
  const cls = s >= 75 ? 'score-high' : s >= 55 ? 'score-mid' : 'score-low';
  return `<span class="score-pill ${cls}">${s}%</span>`;
}
function statusPill(s) {
  const labels = {new:'Nuevo',saved:'Guardado',applied:'Aplicado',aplicado:'Aplicado',interview:'Entrevista',offer:'Oferta',rejected:'Rechazado',rechazado:'Rechazado'};
  const cls = {new:'status-new',saved:'status-saved',applied:'status-applied',aplicado:'status-applied',interview:'status-interview',offer:'status-offer',rejected:'status-rejected',rechazado:'status-rejected'};
  return `<span class="status-pill ${cls[s]||'status-new'}">${labels[s]||'Nuevo'}</span>`;
}
function sourceBadge(s) {
  const colors = {linkedin:'#0077b5',indeed:'#003a9b',bumeran:'#e60000',computrabajo:'#0033a0'};
  return `<span class="source-icon" style="color:${colors[s]||'#888'}">${(s||'').slice(0,2).toUpperCase()}</span>`;
}

function renderJobsTable(jobs) {
  if (!jobs.length) {
    document.getElementById('jobs-list').innerHTML = `<div class="empty"><span class="empty-icon">📭</span>Sin empleos. Hacé un scraping para buscar nuevas oportunidades.</div>`;
    return;
  }
  document.getElementById('jobs-list').innerHTML = `
    <table class="job-table">
      <thead><tr>
        <th>Puesto</th><th>Empresa</th><th>Ubicación</th>
        <th>Score</th><th>Estado</th><th>Fuente</th><th>Fecha</th>
      </tr></thead>
      <tbody>
        ${jobs.map(j => `
          <tr class="job-row" onclick="openDetail(${j.id})">
            <td>
              <div class="job-title-cell">${escHtml(j.title)}</div>
              <div style="display:flex;gap:3px;margin-top:3px;flex-wrap:wrap">
                ${(j.tags||[]).slice(0,3).map(t=>`<span class="tag">${escHtml(t)}</span>`).join('')}
              </div>
            </td>
            <td class="job-company-cell">${escHtml(j.company)}</td>
            <td style="color:var(--mu);font-size:12px">${escHtml(j.location||'')}</td>
            <td>${scorePill(j.match_score)}</td>
            <td>${statusPill(j.status)}</td>
            <td>${sourceBadge(j.source)}</td>
            <td style="color:var(--mu);font-size:11px">${(j.scraped_at||'').slice(0,10)}</td>
          </tr>
        `).join('')}

    </table>`;
}

// ─── Pipeline ─────────────────────────────────────────────────────────────────

async function loadPipeline() {
  try {
    const r = await fetch(`${API}/api/jobs?limit=200`);
    const d = await r.json();
    const jobs = d.jobs || [];
    const cols = {
      new: { label: 'Nuevos', jobs: [], col: '#3b82f620', title: '#60a5fa' },
      saved: { label: 'Guardados', jobs: [], col: '#8b5cf620', title: '#a78bfa' },
      applied: { label: 'Aplicados', jobs: [], col: '#FF980020', title: '#FF9800' },
      interview: { label: 'Entrevista', jobs: [], col: '#FFD70020', title: '#FFD700' },
      offer: { label: 'Oferta', jobs: [], col: '#22c55e20', title: '#22c55e' },
      rejected: { label: 'Rechazado', jobs: [], col: '#88888820', title: '#666' },
    };
    jobs.forEach(j => {
      const k = j.status && cols[j.status] ? j.status : 'new';
      cols[k].jobs.push(j);
    });
    // Merge aplicado → applied
    if (jobs.some(j=>j.status==='aplicado')) {
      jobs.filter(j=>j.status==='aplicado').forEach(j=>cols.applied.jobs.push(j));
    }
    document.getElementById('kanban-board').innerHTML = Object.entries(cols).map(([key,col]) => `
      <div class="kanban-col">
        <div class="kanban-header" style="background:${col.col}">
          <span class="kanban-col-title" style="color:${col.title}">${col.label}</span>
          <span class="kanban-count" style="background:${col.col};color:${col.title}">${col.jobs.length}</span>
        </div>
        ${col.jobs.map(j => `
          <div class="kanban-card" onclick="openDetail(${j.id})">
            <div class="kanban-card-title">${escHtml(j.title)}</div>
            <div class="kanban-card-co">${escHtml(j.company)}</div>
            <div class="kanban-card-footer">
              <div class="score-dot" style="background:${j.match_score>=75?'#22c55e':j.match_score>=55?'#FF9800':'#666'}"></div>
              <span style="font-size:10px;color:var(--mu)">${j.match_score?j.match_score+'%':''}</span>
            </div>
          </div>`).join('')}
        ${col.jobs.length===0?`<div style="font-size:11px;color:var(--mu);text-align:center;padding:12px">Vacío</div>`:''}
      </div>`).join('');
  } catch {}
}

// ─── Insights ─────────────────────────────────────────────────────────────────

async function loadInsights() {
  const el = document.getElementById('insights-content');
  el.innerHTML = `<div class="loading-overlay"><div class="spinner" style="width:24px;height:24px;border-width:3px"></div><div>Analizando tu pipeline con IA...</div></div>`;
  try {
    const r = await fetch(`${API}/api/insights`);
    const d = await r.json();
    const followUps = (d.followUps || []);
    el.innerHTML = `
      ${followUps.length ? `
        <div class="insight-card">
          <div class="insight-title">⚡ Follow-ups pendientes</div>
          ${followUps.map(f=>`
            <div class="follow-item">
              <span class="follow-days">${f.daysAgo}d</span>
              <div>
                <div style="font-size:13px;font-weight:500">${escHtml(f.title)} — ${escHtml(f.company)}</div>
                <div style="font-size:12px;color:var(--mu)">${escHtml(f.suggestion)}</div>
              </div>
            </div>`).join('')}
        </div>` : ''}
      <div class="insight-card">
        <div class="insight-title">🤖 Análisis de tu búsqueda</div>

  }
}

// ─── Profile ──────────────────────────────────────────────────────────────────

async function loadProfile() {
  try {
    const r = await fetch(`${API}/api/profile`);
    const p = await r.json();
    renderProfileForm(p);

}

function renderProfileForm(p) {
  document.getElementById('profile-form').innerHTML = `
    <div class="form-group">
      <label class="form-label">Nombre</label>
      <input class="form-input" id="pf-name" type="text" value="${escAttr(p.name||'')}">
    </div>
    <div class="form-group">
      <label class="form-label">Rol deseado</label>
      <input class="form-input" id="pf-role" type="text" value="${escAttr(p.desired_role||'')}" placeholder="Frontend Developer">
    </div>
    <div class="form-group">
      <label class="form-label">Años de experiencia</label>
      <input class="form-input" id="pf-exp" type="number" value="${p.experience_years||0}" style="width:120px">
    </div>
    <div class="form-group">
      <label class="form-label">Skills (Enter para agregar)</label>
      <div class="tags-input-container" id="skills-container" onclick="document.getElementById('skills-input').focus()">
        ${(p.skills||[]).map(s=>`<span class="tag-chip" data-val="${escAttr(s)}">${escHtml(s)}<button onclick="removeTag(this,'skills-container')">×</button></span>`).join('')}
        <input class="tags-text-input" id="skills-input" placeholder="React, TypeScript..." onkeydown="handleTagInput(event,'skills-container')">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Keywords de búsqueda (Enter para agregar)</label>
      <div class="tags-input-container" id="keywords-container" onclick="document.getElementById('keywords-input').focus()">
        ${(p.keywords||[]).map(s=>`<span class="tag-chip" data-val="${escAttr(s)}">${escHtml(s)}<button onclick="removeTag(this,'keywords-container')">×</button></span>`).join('')}
        <input class="tags-text-input" id="keywords-input" placeholder="frontend developer..." onkeydown="handleTagInput(event,'keywords-container')">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Ubicaciones preferidas (Enter para agregar)</label>
      <div class="tags-input-container" id="locations-container" onclick="document.getElementById('locations-input').focus()">
        ${(p.preferred_locations||[]).map(s=>`<span class="tag-chip" data-val="${escAttr(s)}">${escHtml(s)}<button onclick="removeTag(this,'locations-container')">×</button></span>`).join('')}
        <input class="tags-text-input" id="locations-input" placeholder="Argentina, Remote..." onkeydown="handleTagInput(event,'locations-container')">
      </div>
    </div>`;
}

function handleTagInput(e, containerId) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const input = e.target;
    const val = input.value.replace(',','').trim();
    if (!val) return;
    const container = document.getElementById(containerId);
    const chip = document.createElement('span');
    chip.className = 'tag-chip';
    chip.setAttribute('data-val', val);
    chip.innerHTML = `${escHtml(val)}<button onclick="removeTag(this,'${containerId}')">×</button>`;
    container.insertBefore(chip, input);
    input.value = '';
  }
}

function removeTag(btn, containerId) {
  btn.closest('.tag-chip').remove();
}

function getTagValues(containerId) {
  return Array.from(document.querySelectorAll(`#${containerId} .tag-chip`)).map(c => c.dataset.val);
}

async function saveProfile() {
  const body = {
    name: document.getElementById('pf-name')?.value,
    desired_role: document.getElementById('pf-role')?.value,
    experience_years: Number(document.getElementById('pf-exp')?.value),
    skills: getTagValues('skills-container'),
    keywords: getTagValues('keywords-container'),
    preferred_locations: getTagValues('locations-container'),
  };
  try {
    await fetch(`${API}/api/profile`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    showToast('Perfil guardado ✓');
  } catch { showToast('Error al guardar'); }
}

// ─── Detail Panel ─────────────────────────────────────────────────────────────

  currentJobId = id;
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('detail-body').innerHTML = `<div class="loading-overlay"><div class="spinner" style="width:20px;height:20px;border-width:2px"></div></div>`;
  document.getElementById('detail-header-content').innerHTML = '';

  try {
    const r = await fetch(`${API}/api/jobs/${id}`);
    const j = await r.json();
    renderDetail(j);
  } catch {}
}

        <div class="big-score">${j.match_score}%</div>
        <div>
          <div style="font-size:13px;font-weight:500">${escHtml(a.veredicto||'Match calculado')}</div>

    <div class="d-section">
      <div class="d-section-label">Estado</div>

        <option value="new" ${j.status==='new'?'selected':''}>Nuevo</option>

        <option value="interview" ${j.status==='interview'?'selected':''}>Entrevista</option>
        <option value="offer" ${j.status==='offer'?'selected':''}>Oferta</option>
        <option value="rejected" ${(j.status==='rejected'||j.status==='rechazado')?'selected':''}>Rechazado</option>
      </select>

    ${j.description ? `

        <div class="d-section-body">${escHtml(j.description)}</div>

      <div class="d-section">
        <div class="d-section-label">Por qué aplica ✓</div>
        <ul class="analysis-list">${a.puntos_fuertes.map(p=>`<li>${escHtml(p)}</li>`).join('')}</ul>
      </div>` : ''}

      <div class="d-section">
        <div class="d-section-label">Riesgos a considerar</div>
        <ul class="analysis-list">${a.puntos_debiles.map(p=>`<li>${escHtml(p)}</li>`).join('')}</ul>
      </div>` : ''}

    ${a.consejo_aplicacion ? `
      <div class="d-section">
        <div class="d-section-label">Consejo de la IA</div>
        <div class="d-section-body" style="background:rgba(255,69,0,.06);border:1px solid rgba(255,69,0,.15);border-radius:8px;padding:10px 12px">${escHtml(a.consejo_aplicacion)}</div>
      </div>` : ''}

    <div class="d-section">
      <div class="d-section-label">Notas personales</div>

    <div class="d-section">
      <div class="d-section-label">Próxima acción</div>
      <input class="form-input" id="detail-next-action" placeholder="Ej: Enviar follow-up" value="${escAttr(j.next_action||'')}" style="background:var(--bg3);border:1px solid var(--bd)">

      ${j.url ? `<a href="${escAttr(j.url)}" target="_blank" class="btn btn-sm">🔗 Ver oferta</a>` : ''}

    <div id="cover-section" style="margin-top:16px;display:none">
      <div class="d-section-label">Nota de presentación</div>

async function updateStatus(id, status) {
  await fetch(`${API}/api/jobs/${id}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({status}) });
  showToast('Estado actualizado ✓');
  // Update in-memory
  const job = allJobs.find(j=>j.id===id);
  if (job) job.status = status;
}

async function saveNotes(id) {
  const notes = document.getElementById('detail-notes')?.value;
  const next_action = document.getElementById('detail-next-action')?.value;
  await fetch(`${API}/api/jobs/${id}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({notes, next_action}) });
  showToast('Notas guardadas ✓');
}

async function runAnalysis(id) {
  showToast('Analizando con IA...');
  try {
    await fetch(`${API}/api/jobs/${id}/analyze`, { method:'POST' });
    openDetail(id);
    showToast('Análisis completado ✓');
  } catch { showToast('Error en análisis'); }
}

async function generateCover(id) {
  const section = document.getElementById('cover-section');
  const output = document.getElementById('cover-output');
  section.style.display = 'block';
  output.textContent = 'Generando nota de presentación...';
  try {
    const r = await fetch(`${API}/api/jobs/${id}/cover`, { method:'POST' });
    const d = await r.json();
    output.textContent = d.cover_note || d.error;
  } catch { output.textContent = 'Error al generar'; }
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  currentJobId = null;
}

// ─── Scrape ───────────────────────────────────────────────────────────────────

async function triggerScrape() {
  const btn = document.getElementById('scrape-btn');
  const status = document.getElementById('scrape-status');
  btn.disabled = true;
  status.style.display = 'block';
  showToast('Scraping iniciado — puede tardar 1-2 minutos');
  try {
    await fetch(`${API}/api/scrape`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({}) });
    // Poll until done
    scrapeInterval = setInterval(async () => {
      const r = await fetch(`${API}/api/scrape/status`);
      const d = await r.json();
      if (!d.inProgress) {
        clearInterval(scrapeInterval);
        btn.disabled = false;
        status.style.display = 'none';
        showToast('¡Scraping completo! Recargando empleos...');
        setTimeout(loadJobs, 500);
      }
    }, 3000);
  } catch {
    btn.disabled = false;
    status.style.display = 'none';
    showToast('Error al iniciar scraping');
  }
}

// ─── Utils ────────────────────────────────────────────────────────────────────

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return String(s||'').replace(/"/g,'&quot;'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── Init ─────────────────────────────────────────────────────────────────────

navigate('jobs');
</script>
